spring.application.name=travel_platform
# Load local secrets/config from .env (dotenv-style KEY=VALUE)
spring.config.import=optional:file:.env[.properties]
# ===== Server =====
server.port=8080
spring.servlet.encoding.charset=UTF-8
spring.servlet.encoding.enabled=true
spring.servlet.encoding.force=true
# ===== MySQL Datasource =====
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://127.0.0.1:3306/travel_platform?createDatabaseIfNotExist=true&useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=bitc5600!
# ===== JPA / Hibernate =====
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false
# ===== Mustache =====
spring.mustache.servlet.expose-session-attributes=true
spring.mustache.servlet.expose-request-attributes=true
# ===== SQL Init (MySQL) =====
# 최초 1회 세팅 시에만 always로 변경 후 앱을 실행하고,
# 초기화가 끝나면 반드시 never로 되돌린다.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/mysql-init.sql
spring.sql.init.encoding=UTF-8

# Session Tracking Mode (URL에 jsessionid 노출 방지)
server.servlet.session.tracking-modes=cookie
server.servlet.session.timeout=30m

spring.output.ansi.enabled=always

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

name: Telegram PR Notify

on:
  pull_request:
    types: [opened, reopened, ready_for_review, review_requested, closed]

jobs:
  notify:
    runs-on: ubuntu-latest

    steps:
      - name: Build message
        id: msg
        run: |
          ACTION="${{ github.event.action }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_URL="${{ github.event.pull_request.html_url }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_NUMBER="${{ github.event.pull_request.number }}"
          REPO="${{ github.repository }}"

          TEXT="🔔 PR 이벤트: ${ACTION}%0A📦 Repo: ${REPO}%0A#️⃣ PR: #${PR_NUMBER}%0A📝 제목: ${PR_TITLE}%0A👤 작성자: ${PR_AUTHOR}%0A🔗 ${PR_URL}"

          # PR이 close 되었을 때 merge 여부 표시
          MERGED="${{ github.event.pull_request.merged }}"
          if [ "$ACTION" = "closed" ]; then
            if [ "$MERGED" = "true" ]; then
              TEXT="✅ PR 머지됨%0A📦 Repo: ${REPO}%0A#️⃣ PR: #${PR_NUMBER}%0A📝 제목: ${PR_TITLE}%0A👤 작성자: ${PR_AUTHOR}%0A🔗 ${PR_URL}"
            else
              TEXT="🔒 PR 닫힘(머지 아님)%0A📦 Repo: ${REPO}%0A#️⃣ PR: #${PR_NUMBER}%0A📝 제목: ${PR_TITLE}%0A👤 작성자: ${PR_AUTHOR}%0A🔗 ${PR_URL}"
            fi
          fi

          echo "text=$TEXT" >> $GITHUB_OUTPUT

      - name: Send Telegram message
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TEXT: ${{ steps.msg.outputs.text }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d "chat_id=${TELEGRAM_CHAT_ID}" \
            -d "text=${TEXT}" \
            -d "disable_web_page_preview=true"
